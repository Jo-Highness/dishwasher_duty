<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#36D1DC"/>
      <stop offset="1" stop-color="#1E88E5"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- tile -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="256" rx="112" fill="url(#sheen)"/>

  <!-- dishwasher body -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
    <rect x="118" y="92" width="276" height="332" rx="30" stroke-width="18" fill="#ffffff" fill-opacity="0.10"/>
    <!-- control panel -->
    <line x1="118" y1="170" x2="394" y2="170" stroke-width="14"/>
    <rect x="146" y="122" width="92" height="20" rx="10" stroke-width="0" fill="#ffffff" fill-opacity="0.85"/>
    <!-- door window with plate -->
    <circle cx="256" cy="304" r="94" stroke-width="16"/>
    <circle cx="256" cy="304" r="52" stroke-width="12"/>
  </g>
  <!-- buttons -->
  <circle cx="356" cy="132" r="11" fill="#ffffff"/>
  <circle cx="316" cy="132" r="11" fill="#ffffff" fill-opacity="0.7"/>

  <!-- duty done badge -->
  <circle cx="372" cy="396" r="62" fill="#2ECC71" stroke="#ffffff" stroke-width="10"/>
  <path d="M344 396 l18 19 l34 -38" fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
